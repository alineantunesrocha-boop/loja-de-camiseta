<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeeStyle | Loja de Camisetas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TeeStyle</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Carrinho (<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Nossas Estampas</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Camiseta Minimalista">
                <h3>Camiseta Minimal</h3>
                <p>R$ 59,90</p>
                <button class="add-btn" data-product="Camiseta Minimal">Comprar</button>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Camiseta Retro">
                <h3>Camiseta Retro</h3>
                <p>R$ 74,90</p>
                <button class="add-btn" data-product="Camiseta Retro">Comprar</button>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Camiseta Urban">
                <h3>Camiseta Urban</h3>
                <p>R$ 89,90</p>
                <button class="add-btn" data-product="Camiseta Urban">Comprar</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
